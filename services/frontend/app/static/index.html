<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RISE Meeting</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Accuracy-first UAC inquiry</p>
        <h1>RISE Meeting</h1>
      </div>
      <button id="new-chat" class="secondary" type="button">New chat</button>
    </header>

    <section id="chat-transcript" class="chat-transcript" aria-live="polite">
      <article class="message assistant-message welcome-message">
        <p class="eyebrow">RISE Meeting</p>
        <h2>Ask across complete UAC agenda papers and official Minutes.</h2>
        <p>I will separate confirmed evidence from possible matches, preserve the conversation, and link every source back to its original PDF.</p>
      </article>
    </section>

    <form id="chat-composer" class="chat-composer">
      <textarea id="question" required rows="2" placeholder="Ask about a topic, person, history, or comparison..."></textarea>
      <button type="submit">Investigate</button>
    </form>
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
